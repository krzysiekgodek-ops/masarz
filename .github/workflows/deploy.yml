name: Deploy masarz to MyDevil

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_STRIPE_LINK_MINI: ${{ secrets.VITE_STRIPE_LINK_MINI }}
          VITE_STRIPE_LINK_MIDI: ${{ secrets.VITE_STRIPE_LINK_MIDI }}
          VITE_STRIPE_LINK_MAXI: ${{ secrets.VITE_STRIPE_LINK_MAXI }}
          VITE_STRIPE_LINK_VIP: ${{ secrets.VITE_STRIPE_LINK_VIP }}

      - name: Deploy via rsync
        uses: Burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: ./dist/
          remote_path: /usr/home/pluszek2026/domains/masarz.ebra.pl/public_html/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
